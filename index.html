<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>115學測答題器</title>
  <style>
    :root { --bg:#0b1020; --panel:#121933; --card:#1a2347; --text:#e9eefc; --muted:#a8b3d6; --ok:#1fbf75; --bad:#ff6b6b; --accent:#5ea1ff; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background:var(--bg); color:var(--text); }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 24px; }
    .topbar, .panel, .question { background:var(--panel); border-radius:16px; padding:20px; margin-bottom:16px; }
    h1,h2,h3,p { margin:0; }
    .topbar { display:flex; gap:16px; align-items:center; justify-content:space-between; flex-wrap:wrap; }
    .controls { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    select, button, input[type="text"] { border:none; border-radius:10px; padding:10px 14px; font-size:14px; }
    select { background:#fff; color:#111; }
    input[type="text"] { background:#fff; color:#111; width:100%; }
    button { background:var(--accent); color:#fff; cursor:pointer; font-weight:600; }
    button.secondary { background:#2d3a72; }
    .meta { color:var(--muted); font-size:14px; }
    .question { background:var(--card); }
    .question.correct { outline:2px solid rgba(31,191,117,.7); }
    .question.wrong { outline:2px solid rgba(255,107,107,.7); }
    .qhead { display:flex; justify-content:space-between; gap:12px; margin-bottom:12px; flex-wrap:wrap; }
    .stem { white-space:pre-wrap; line-height:1.7; margin-bottom:14px; }
    .choices, .fill-grid { display:grid; gap:8px; }
    label.choice, .fill-box { display:flex; gap:10px; align-items:flex-start; padding:12px; border-radius:12px; background:#0f1738; cursor:pointer; }
    label.choice input { margin-top:3px; }
    .fill-grid { grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); }
    .fill-box { flex-direction:column; cursor:default; }
    .fill-box span { color:var(--muted); font-size:13px; }
    .result { margin-top:14px; font-size:14px; line-height:1.6; }
    .ok { color:var(--ok); font-weight:700; }
    .bad { color:var(--bad); font-weight:700; }
    .summary { display:grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap:12px; }
    .summary .item { background:#0f1738; border-radius:12px; padding:14px; }
    .hidden { display:none; }
    .footer { color:var(--muted); font-size:13px; margin-top:18px; line-height:1.6; }
    code { color:#c7d7ff; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1>115學測答題器</h1>
        <p class="meta">以官方 CEEC 題目 TXT 建立，可交卷後自動檢查客觀題</p>
      </div>
      <div class="controls">
        <select id="subjectSelect"></select>
        <button id="submitBtn">交卷</button>
        <button id="resetBtn" class="secondary">重作本卷</button>
      </div>
    </div>

    <div class="panel">
      <div class="summary" id="summary">
        <div class="item"><div class="meta">科目</div><div id="summarySubject">-</div></div>
        <div class="item"><div class="meta">題數</div><div id="summaryCount">-</div></div>
        <div class="item"><div class="meta">答對</div><div id="summaryCorrect">-</div></div>
        <div class="item"><div class="meta">得分</div><div id="summaryScore">-</div></div>
      </div>
      <p class="footer" id="subjectNote"></p>
      <p class="footer">目前優先完成非英文科目。圖表/附圖題僅保留文字摘錄，未嵌入 PDF 原圖；需要完整重現時可再補圖像資產。</p>
    </div>

    <div id="questions"></div>
  </div>
  <script src="./data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
